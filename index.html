<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT CHINA RTP - Sinais de Casino</title>
    <!-- Tailwind CSS 3.4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --color-primary: #00ff88;
            --color-secondary: #00d4ff;
            --color-dark: #0a0a0a;
        }

        body {
            background-color: var(--color-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glow-green {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 255, 136, 0.3);
        }

        @keyframes scan {
            from { top: -10%; }
            to { top: 110%; }
        }

        .scanner-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
            animation: scan 2s linear infinite;
            z-index: 20;
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rtp-bar-inner {
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-pulse-soft {
            animation: pulse-soft 2s infinite;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2a2a2a;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00ff88',
                        secondary: '#00d4ff',
                        dark: '#0a0a0a',
                    }
                }
            }
        }
    </script>
</head>
<body class="selection:bg-primary selection:text-dark">
    <!-- Background Glow -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-20 overflow-hidden -z-10">
        <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] bg-primary rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[60%] h-[60%] bg-secondary rounded-full blur-[120px]"></div>
    </div>

    <div class="max-w-lg mx-auto px-4 py-8 relative">
        <!-- Admin Modal -->
        <div id="admin-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 hidden backdrop-blur-sm">
            <div class="glass-card w-full max-w-sm rounded-[2rem] p-6 border-primary/30 relative max-h-[90vh] flex flex-col shadow-2xl">
                <button onclick="closeAdmin()" class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors p-2">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                <div id="login-view">
                    <h2 class="text-xl font-black mb-6 uppercase italic text-center">Acesso <span class="text-primary tracking-widest">ADMIN</span></h2>
                    <input type="password" id="admin-pass" placeholder="Digite a senha..." class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-4 mb-4 focus:border-primary outline-none text-center font-mono tracking-widest">
                    <button onclick="tryLogin()" class="w-full bg-primary text-dark font-black py-4 rounded-xl active:scale-95 transition-all uppercase italic">Entrar</button>
                </div>
                <div id="admin-view" class="hidden flex flex-col h-full">
                    <h2 class="text-xl font-black mb-6 uppercase italic text-center shrink-0">Configurar <span class="text-primary tracking-widest">LINKS</span></h2>
                    <div id="links-editor" class="space-y-4 mb-6 overflow-y-auto pr-1 flex-1 custom-scrollbar">
                        <!-- Inputs will be injected here -->
                    </div>
                    <button onclick="saveLinks()" class="w-full bg-primary text-dark font-black py-4 rounded-xl active:scale-95 transition-all uppercase italic shrink-0">Salvar Alterações</button>
                </div>
            </div>
        </div>

        <!-- Header -->
        <header class="flex flex-col items-center mb-10 text-center">
            <div id="robot-icon" class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-4 border border-primary/20 glow-green cursor-pointer select-none touch-none transition-transform active:scale-90" title="Clique longo para Admin">
                <i data-lucide="bot" class="w-10 h-10 text-primary"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter mb-1 uppercase italic glow-text">
                BOT <span class="text-primary tracking-widest">CHINA</span> RTP
            </h1>
            <p class="text-gray-400 text-xs flex items-center gap-2 uppercase tracking-widest font-bold">
                <i data-lucide="shield-check" class="w-4 h-4 text-primary"></i>
                Tecnologia de Análise IA
            </p>
        </header>

        <!-- Live Status Card -->
        <div id="status-card" class="glass-card rounded-3xl p-6 mb-4 relative overflow-hidden">
            <div id="scanner" class="scanner-line hidden"></div>
            
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(0,255,136,0.8)]"></div>
                    <span id="status-text" class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                        Analista Online
                    </span>
                </div>
                <div class="flex items-center gap-1 text-[10px] text-gray-500 font-mono font-bold">
                    <i data-lucide="clock" class="w-3 h-3"></i>
                    <span id="last-update">00:00:00</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/40 rounded-2xl p-4 border border-white/5">
                    <i data-lucide="trending-up" class="w-5 h-5 text-secondary mb-2"></i>
                    <div id="max-rtp" class="text-2xl font-black text-white italic">98.4%</div>
                    <div class="text-[9px] text-gray-500 uppercase font-black tracking-tighter">Máximo Encontrado</div>
                </div>
                <div class="bg-black/40 rounded-2xl p-4 border border-white/5">
                    <i data-lucide="zap" class="w-5 h-5 text-primary mb-2"></i>
                    <div id="bugs-count" class="text-2xl font-black text-white italic">14</div>
                    <div class="text-[9px] text-gray-500 uppercase font-black tracking-tighter">Eventos Detectados</div>
                </div>
            </div>
        </div>

        <!-- Update Button -->
        <button id="update-btn" onclick="triggerScan()" class="w-full bg-white/5 hover:bg-primary/20 border border-white/10 hover:border-primary/50 text-white font-black py-4 rounded-2xl mb-8 transition-all flex items-center justify-center gap-3 uppercase italic tracking-widest text-sm group active:scale-95">
            <i data-lucide="refresh-cw" class="w-5 h-5 text-primary group-hover:rotate-180 transition-transform duration-500"></i>
            Atualizar Sinais IA
        </button>

        <!-- Section Title -->
        <div class="flex items-center justify-between mb-4 px-1">
            <h2 class="text-xs font-black uppercase tracking-widest text-gray-300 flex items-center gap-2 italic">
                <i data-lucide="bar-chart-3" class="w-4 h-4 text-primary"></i>
                Sinais Identificados
            </h2>
            <div class="text-[9px] text-primary bg-primary/10 px-2 py-1 rounded-lg border border-primary/20 font-bold uppercase tracking-widest flex items-center gap-1">
                <i data-lucide="layout-grid" class="w-3 h-3"></i>
                Multi-Provedor
            </div>
        </div>

        <!-- Game List Container -->
        <div id="game-list" class="space-y-4 mb-10">
            <!-- Games will be injected here -->
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center pb-8">
            <div class="w-12 h-1 bg-white/10 mx-auto rounded-full mb-6"></div>
            <p class="text-[9px] uppercase font-black tracking-[0.4em] text-gray-700">BOT CHINA TECHNOLOGY 2026</p>
        </footer>
    </div>

    <!-- Application Logic -->
    <script>
        // Pool de 22 Jogos - Mantendo Jogo e Provedor Vinculados
        const ALL_GAMES_POOL = [
            { name: '3 pots riches', provider: 'playson', image: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=200&h=200&fit=crop&q=80' },
            { name: 'lucky jaguar 500', provider: 'tada games', image: 'https://images.unsplash.com/photo-1596838132731-dd9e771b2d07?w=200&h=200&fit=crop&q=80' },
            { name: 'Dragon hacht 2', provider: 'PG', image: 'https://images.unsplash.com/photo-1614027164847-1b5c91ebbe47?w=200&h=200&fit=crop&q=80' },
            { name: 'wild bounty showdown', provider: 'PG', image: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200&h=200&fit=crop&q=80' },
            { name: 'Gold party', provider: 'PP', image: 'https://images.unsplash.com/photo-1596838132731-dd9e771b2d07?w=200&h=200&fit=crop&q=80' },
            { name: 'lucky monkey', provider: 'PP', image: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200&h=200&fit=crop&q=80' },
            { name: 'Lucky tiger', provider: 'tada', image: 'https://images.unsplash.com/photo-1596838132731-dd9e771b2d07?w=200&h=200&fit=crop&q=80' },
            { name: 'luky jaguar 2', provider: 'tada', image: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=200&h=200&fit=crop&q=80' },
            { name: 'Luckycrown', provider: 'king game', image: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200&h=200&fit=crop&q=80' },
            { name: 'caishen 2', provider: 'PP', image: 'https://images.unsplash.com/photo-1614027164847-1b5c91ebbe47?w=200&h=200&fit=crop&q=80' },
            { name: 'pinata wins', provider: 'PG', image: 'https://images.unsplash.com/photo-1596838132731-dd9e771b2d07?w=200&h=200&fit=crop&q=80' },
            { name: 'facaishen', provider: 'g759 slot', image: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=200&h=200&fit=crop&q=80' },
            { name: 'rabits grace', provider: 'g759slot', image: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200&h=200&fit=crop&q=80' },
            { name: 'fortune sheep', provider: 'g759slot', image: 'https://images.unsplash.com/photo-1614027164847-1b5c91ebbe47?w=200&h=200&fit=crop&q=80' },
            { name: 'sabor mexicano', provider: 'g759slot', image: 'https://images.unsplash.com/photo-1596838132731-dd9e771b2d07?w=200&h=200&fit=crop&q=80' },
            { name: 'dragons grace', provider: 'g759 slot', image: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200&h=200&fit=crop&q=80' },
            { name: 'coin strike', provider: 'playson', image: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=200&h=200&fit=crop&q=80' },
            { name: 'fire temple', provider: 'playson', image: 'https://images.unsplash.com/photo-1614027164847-1b5c91ebbe47?w=200&h=200&fit=crop&q=80' },
            { name: '4 pots riches', provider: 'playson', image: 'https://images.unsplash.com/photo-1596838132731-dd9e771b2d07?w=200&h=200&fit=crop&q=80' },
            { name: 'wildbison charge', provider: 'PP', image: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200&h=200&fit=crop&q=80' },
            { name: 'fire portal', provider: 'PP', image: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=200&h=200&fit=crop&q=80' },
            { name: 'wild walker', provider: 'PP', image: 'https://images.unsplash.com/photo-1614027164847-1b5c91ebbe47?w=200&h=200&fit=crop&q=80' }
        ];

        let GAMES_DATA = [];
        let LINK_POOL = JSON.parse(localStorage.getItem('rtp_bot_link_pool')) || Array(10).fill('https://seullink.com');

        // Configurações JSONBin
        const BIN_ID = '69f3ec1d856a682189917d6f';
        const MASTER_KEY = '$2a$10$RxtN.VwYLRsGcmoCji08oeL2di9W0D4tyrBZe/vIV77N665ALQ9Vi';

        // Funções de Nuvem
        async function fetchCloudLinks() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await response.json();
                if (data.record && data.record.links) {
                    const newPool = data.record.links;
                    // Só atualiza se houver mudança real para evitar re-renderizações desnecessárias
                    if (JSON.stringify(newPool) !== JSON.stringify(LINK_POOL)) {
                        LINK_POOL = newPool;
                        localStorage.setItem('rtp_bot_link_pool', JSON.stringify(LINK_POOL));
                        // Se o admin estiver aberto, atualiza a lista dele também
                        if (!document.getElementById('admin-view').classList.contains('hidden')) {
                            setupAdminList();
                        }
                    }
                    return true;
                }
            } catch (e) { console.error("Cloud Error:", e); }
            return false;
        }

        function getActiveLinks() {
            // Filtra links vazios. Se o usuário deixou o link padrão mas adicionou outros, 
            // podemos considerar apenas os que ele realmente mexeu se quisermos, 
            // mas aqui vamos filtrar apenas os vazios para permitir múltiplos links iguais se desejado.
            const filtered = LINK_POOL.filter(l => l && l.trim() !== '');
            return filtered.length > 0 ? filtered : ['https://seullink.com'];
        }

        async function saveCloudLinks(newPool) {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify({ links: newPool })
                });
                return response.ok;
            } catch (e) { return false; }
        }

        // Funções Globais
        window.closeAdmin = function() {
            document.getElementById('admin-modal').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('admin-pass').value = '';
        };

        window.tryLogin = function() {
            const passInput = document.getElementById('admin-pass');
            const pass = passInput.value.trim();
            if (pass === 'adm2026') {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                setupAdminList();
            } else {
                alert('Acesso negado!');
                passInput.value = '';
            }
        };

        function setupAdminList() {
            const container = document.getElementById('links-editor');
            if (!container) return;
            
            const activeCount = LINK_POOL.filter(l => l && l.trim() !== '').length;
            
            let html = `<div class="mb-4 p-4 bg-primary/10 rounded-2xl border border-primary/20">
                <p class="text-[10px] text-primary uppercase font-black mb-1 italic text-center">Configuração de Links</p>
                <p class="text-[8px] text-gray-500 uppercase text-center mb-4 font-bold">${activeCount} de 10 slots ativos</p>
                <div class="grid grid-cols-1 gap-4">`;
            
            for(let i=0; i<10; i++) {
                const linkValue = LINK_POOL[i] || '';
                html += `<div class="group">
                    <label class="text-[9px] text-gray-500 uppercase font-black block mb-1 ml-1 group-focus-within:text-primary transition-colors">Slot ${i + 1}</label>
                    <input type="text" id="pool-link-${i}" value="${linkValue}" 
                        class="w-full bg-black/60 border border-white/10 rounded-xl px-4 py-3 text-xs outline-none focus:border-primary/50 text-gray-300 transition-all focus:bg-black/80"
                        placeholder="https://exemplo.com/link">
                </div>`;
            }
            
            html += `</div></div>`;
            container.innerHTML = html;
        }

        window.saveLinks = async function() {
            const saveBtn = document.querySelector('#admin-view button[onclick="saveLinks()"]');
            if (saveBtn) {
                saveBtn.innerText = 'Sincronizando Nuvem...';
                saveBtn.classList.add('opacity-50', 'pointer-events-none');
            }

            const newPool = [];
            for(let i=0; i<10; i++) {
                const input = document.getElementById(`pool-link-${i}`);
                if (input) newPool.push(input.value.trim());
            }

            const success = await saveCloudLinks(newPool);
            if (success) {
                localStorage.setItem('rtp_bot_link_pool', JSON.stringify(newPool));
                alert('Banco de dados BIN atualizado com sucesso!');
                window.closeAdmin();
                location.reload(); 
            } else {
                alert('Erro na sincronização Cloud. Tente novamente.');
                if (saveBtn) {
                    saveBtn.innerText = 'Salvar Alterações';
                    saveBtn.classList.remove('opacity-50', 'pointer-events-none');
                }
            }
        };

        function init() {
            lucide.createIcons();
            
            // Busca links da nuvem em segundo plano sem bloquear a interface
            fetchCloudLinks();

            const gameList = document.getElementById('game-list');
            const lastUpdateLabel = document.getElementById('last-update');
            const scanner = document.getElementById('scanner');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const maxRtpLabel = document.getElementById('max-rtp');
            const bugsLabel = document.getElementById('bugs-count');
            const robotIcon = document.getElementById('robot-icon');
            const mainCtaLink = document.getElementById('main-cta-link');
            const passInput = document.getElementById('admin-pass');

            // Renderização inicial imediata baseada no cache local
            const shuffledGames = [...ALL_GAMES_POOL].sort(() => Math.random() - 0.5);
            const selectedGames = shuffledGames.slice(0, 4);
            const shuffledLinks = getActiveLinks().sort(() => Math.random() - 0.5);

            GAMES_DATA = selectedGames.map((game, idx) => ({
                ...game,
                rtp: parseFloat((Math.random() * (99 - 94) + 94).toFixed(1)),
                status: Math.random() > 0.6 ? 'ALTO' : 'ESTÁVEL',
                link: shuffledLinks[idx % shuffledLinks.length],
                minDeposit: Math.floor(Math.random() * (200 - 30) + 30),
                recommendedBet: (Math.random() * (40 - 0.4) + 0.4).toFixed(2)
            }));

            if (mainCtaLink) {
                mainCtaLink.href = shuffledLinks[Math.floor(Math.random() * shuffledLinks.length)];
            }

            renderGames(GAMES_DATA);
            updateTimestamp();

            passInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.tryLogin(); });

            let pressTimer;
            const startPress = () => { pressTimer = setTimeout(() => { document.getElementById('admin-modal').classList.remove('hidden'); }, 1500); };
            const endPress = () => clearTimeout(pressTimer);

            robotIcon.addEventListener('mousedown', startPress);
            robotIcon.addEventListener('mouseup', endPress);
            robotIcon.addEventListener('mouseleave', endPress);
            robotIcon.addEventListener('touchstart', startPress, {passive: true});
            robotIcon.addEventListener('touchend', endPress);

            function updateTimestamp() { lastUpdateLabel.innerText = new Date().toLocaleTimeString('pt-BR'); }

        function renderGames(data) {
            const gameList = document.getElementById('game-list');
            if (!gameList) return;
            
            gameList.innerHTML = '';
            const fragment = document.createDocumentFragment();

            data.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl overflow-hidden group opacity-0';
                card.style.animation = `fadeInUp 0.4s ease forwards ${index * 0.08}s`;
                card.innerHTML = `
                    <div class="p-4 flex flex-col gap-4">
                        <div class="flex items-center gap-4">
                            <div class="relative shrink-0">
                                <img src="${game.image}" alt="${game.name}" loading="lazy" class="w-16 h-16 rounded-xl object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent rounded-xl"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-black text-white mb-1 truncate uppercase tracking-tight text-sm italic">
                                    ${game.name} 
                                    <span class="text-[10px] text-primary lowercase font-normal opacity-80 block md:inline md:ml-1">— ${game.provider}</span>
                                </h3>
                                <div class="flex items-center gap-2 mb-2">
                                    <div class="flex-1 h-1.5 bg-black/50 rounded-full overflow-hidden">
                                        <div class="rtp-bar-inner h-full ${game.rtp > 97 ? 'bg-primary shadow-[0_0_8px_rgba(0,255,136,0.4)]' : 'bg-secondary shadow-[0_0_8px_rgba(0,212,255,0.4)]'}" style="width: ${game.rtp}%"></div>
                                    </div>
                                    <span class="text-[10px] font-mono font-black text-primary">${game.rtp}%</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[8px] px-1.5 py-0.5 rounded-md font-black uppercase ${game.status === 'ALTO' ? 'bg-primary/20 text-primary' : 'bg-secondary/20 text-secondary'}">
                                        RTP ${game.status}
                                    </span>
                                    <span class="text-[8px] text-gray-500 font-bold uppercase tracking-widest italic">Sinal Ativo</span>
                                </div>
                            </div>
                            <a href="${game.link}" target="_blank" class="bg-primary text-dark p-3 rounded-2xl hover:scale-110 active:scale-90 transition-all shadow-lg active:shadow-none">
                                <i data-lucide="external-link" class="w-5 h-5"></i>
                            </a>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 pt-3 border-t border-white/5">
                            <div class="bg-black/30 p-2 rounded-xl border border-white/5">
                                <p class="text-[7px] text-gray-500 uppercase font-black mb-1 tracking-tighter">Depósito Recomendado</p>
                                <p class="text-xs font-black text-white italic">R$ ${game.minDeposit},00</p>
                            </div>
                            <div class="bg-black/30 p-2 rounded-xl border border-white/5 text-right">
                                <p class="text-[7px] text-gray-500 uppercase font-black mb-1 tracking-tighter">Bet Sugerida</p>
                                <p class="text-xs font-black text-primary italic">R$ ${game.recommendedBet.replace('.', ',')}</p>
                            </div>
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            
            gameList.appendChild(fragment);
            // Otimização: Apenas processar ícones dentro do container da lista
            lucide.createIcons({ root: gameList });
        }

            window.triggerScan = function() {
                const btn = document.getElementById('update-btn');
                const scanner = document.getElementById('scanner');
                const statusDot = document.getElementById('status-dot');
                const statusText = document.getElementById('status-text');
                const maxRtpLabel = document.getElementById('max-rtp');
                const bugsLabel = document.getElementById('bugs-count');

                if (btn && btn.classList.contains('opacity-50')) return;

                if (btn) btn.classList.add('opacity-50', 'pointer-events-none');
                
                if (scanner) scanner.classList.remove('hidden');
                if (statusDot) {
                    statusDot.classList.remove('bg-primary');
                    statusDot.classList.add('bg-yellow-400', 'animate-pulse');
                }
                if (statusText) {
                    statusText.innerText = 'Escanenando Provedores...';
                    statusText.classList.remove('text-gray-400');
                    statusText.classList.add('text-yellow-400');
                }

                // Feedback visual de saída
                const cards = document.querySelectorAll('#game-list > div');
                cards.forEach(c => c.style.opacity = '0.2');

                setTimeout(() => {
                    const shuffledGames = [...ALL_GAMES_POOL].sort(() => Math.random() - 0.5);
                    const selectedGames = shuffledGames.slice(0, 4);
                    const shuffledLinks = getActiveLinks().sort(() => Math.random() - 0.5);

                    GAMES_DATA = selectedGames.map((game, idx) => ({
                        ...game,
                        rtp: parseFloat((Math.random() * (99 - 94) + 94).toFixed(1)),
                        status: Math.random() > 0.6 ? 'ALTO' : 'ESTÁVEL',
                        link: shuffledLinks[idx % shuffledLinks.length],
                        minDeposit: Math.floor(Math.random() * (200 - 30) + 30),
                        recommendedBet: (Math.random() * (40 - 0.4) + 0.4).toFixed(2)
                    }));

                    if (maxRtpLabel) maxRtpLabel.innerText = Math.max(...GAMES_DATA.map(g => g.rtp)).toFixed(1) + '%';
                    if (bugsLabel) bugsLabel.innerText = Math.floor(Math.random() * (20 - 8) + 8);
                    
                    renderGames(GAMES_DATA);
                    updateTimestamp();
                    
                    if (scanner) scanner.classList.add('hidden');
                    if (statusDot) {
                        statusDot.classList.remove('bg-yellow-400', 'animate-pulse');
                        statusDot.classList.add('bg-primary');
                    }
                    if (statusText) {
                        statusText.innerText = 'Analista Online';
                        statusText.classList.remove('text-yellow-400');
                        statusText.classList.add('text-gray-400');
                    }
                    
                    if (btn) btn.classList.remove('opacity-50', 'pointer-events-none');
                }, 1800); 
            }
        }
        window.onload = init;
    </script>
</body>
</html>
